name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "index.html"
      - "404.html"
      - "dashboard.html"
      - "story.html"
      - "share.html"
      - ".nojekyll"
      - "_next/**"
      - "dashboard/**"
      - "story/**"
      - "share/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_APP_URL: https://abudkina.github.io/LoveStory

      - run: node scripts/prepare-pages.mjs

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true

      - name: Publish build to main root
        run: |
          for item in index.html 404.html dashboard.html story.html share.html .nojekyll; do
            [ -f "out/$item" ] && cp "out/$item" .
          done
          rm -rf _next dashboard story share
          [ -d out/_next ] && cp -r out/_next .
          for dir in dashboard story share; do
            [ -d "out/$dir" ] && cp -r "out/$dir" .
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f index.html 404.html dashboard.html story.html share.html .nojekyll _next
          [ -d dashboard ] && git add -f dashboard
          [ -d story ] && git add -f story
          [ -d share ] && git add -f share
          git diff --staged --quiet && exit 0
          git commit -m "Deploy static site [skip ci]"
          git push
